document_type: notice
name: 通知
fit_departments:
  - admin
  - general_office
purpose: 发布安排、传达事项、布置工作、告知执行要求。
structure:
  - title: 标题
    rule: 发文机关或事项 + 通知；公司内部可简化为“关于……的通知”。
  - title: 主送对象
    rule: 写明适用部门、人员或单位。
  - title: 缘由
    rule: 简要说明背景、依据或目的，不展开过多论证。
  - title: 事项
    rule: 按“一、二、三”列出时间、范围、要求、责任分工。
  - title: 结尾
    rule: 明确执行、反馈或联系人要求。
tone:
  - 准确
  - 直接
  - 正式
  - 少修饰
generation_rules:
  - 不虚构政策依据、会议决定、领导要求。
  - 涉及时间、地点、责任人时优先保留用户原始信息。
  - 公司内部通知避免过度机关化，保持清晰可执行。
polish_rules:
  - 优先修正冗余、口语化、错别字和标点问题。
  - 不改变责任主体、时间范围、数量和产品名称。
  - 中重度润色也应保持通知的可执行性。
